<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-green': {
                light: '#E6F8F0',
                DEFAULT: '#00B894',
                dark: '#00896B',
              },
              'brand-blue': {
                light: '#EBF5FF',
                DEFAULT: '#3498DB',
                dark: '#2980B9',
              },
              'brand-orange': {
                light: '#FFF4E6',
                DEFAULT: '#F39C12',
              },
               'brand-yellow': {
                light: '#FEF9E7',
                DEFAULT: '#F1C40F',
              }
            }
          }
        },
        // This allows us to target the theme class with variants
        variants: {
          extend: {},
        },
        plugins: [
            function({ addVariant }) {
                addVariant('theme-athlete', '.theme-athlete &');
                addVariant('theme-dark', '.theme-dark &');
            }
        ],
      }
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Added to prevent duplicate scrollbars */
      }
      #root {
        height: 100%;
      }
      /* === SIMPLE DARK MODE THEME === */
      .theme-dark {
        --bg-primary: #0F172A; /* Slate-900 */
        --bg-sidebar: #0F172A; /* Slate-900 */
        --bg-card: #1E293B; /* Slate-800 */
        --bg-card-alt: #334155; /* Slate-700 */
        --border-color: #334155; /* Slate-700 */
        --text-primary: #F8FAFC; /* Slate-50 */
        --text-secondary: #94A3B8; /* Slate-400 */
        --accent-green: #10B981; /* Emerald-500 */
        --active-sidebar-bg: rgba(16, 185, 129, 0.12);
      }
      .theme-dark {
        background-color: var(--bg-primary);
        color: var(--text-primary);
      }
      .theme-dark aside {
        background-color: var(--bg-card) !important;
        border-color: var(--border-color) !important;
      }
      
      .theme-dark.bg-slate-50, .theme-dark.bg-slate-100 { background-color: var(--bg-primary); }
      .theme-dark .bg-white, .theme-dark .bg-white\/80, .theme-dark [class*="bg-white/"] { background-color: var(--bg-card) !important; }
      
      .theme-dark .hover\:bg-gray-100:hover, 
      .theme-dark .bg-gray-50, 
      .theme-dark .bg-gray-105,
      .theme-dark .bg-gray-100, 
      .theme-dark .bg-gray-200, 
      .theme-dark .bg-slate-50, 
      .theme-dark .bg-slate-100, 
      .theme-dark .bg-slate-200,
      .theme-dark [class*="bg-slate-50/"],
      .theme-dark [class*="bg-slate-100/"],
      .theme-dark [class*="bg-slate-200/"],
      .theme-dark [class*="bg-gray-50/"],
      .theme-dark [class*="bg-gray-100/"] { 
          background-color: var(--bg-card-alt) !important; 
      }

      .theme-dark .text-slate-950, .theme-dark .text-slate-900, .theme-dark .text-slate-850, .theme-dark .text-slate-800 { color: var(--text-primary) !important; }
      .theme-dark .text-slate-705, .theme-dark .text-slate-700, .theme-dark .text-slate-600 { color: #CBD5E0 !important; }
      .theme-dark .text-slate-500, .theme-dark .text-slate-400 { color: var(--text-secondary) !important; }

      .theme-dark .border-gray-100, .theme-dark .border-gray-200, .theme-dark .border-gray-300,
      .theme-dark [class*="border-gray-"], 
      .theme-dark [class*="border-slate-"] { 
          border-color: var(--border-color) !important; 
      }

      .theme-dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.4); }
      .theme-dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.4); }

      .theme-dark .bg-brand-green { background-color: var(--accent-green); }
      .theme-dark .hover\:bg-brand-green-dark:hover { background-color: #059669; } /* emerald-600 */
      .theme-dark .bg-brand-green-light { background-color: var(--active-sidebar-bg); }
      .theme-dark .text-brand-green { color: var(--accent-green); }
      .theme-dark .text-brand-green-dark { color: #34D399; }
      .theme-dark .border-brand-green { border-color: var(--accent-green); }
      
      .theme-dark .bg-brand-green-light > button.bg-white {
          background-color: transparent !important;
          color: var(--text-secondary) !important;
      }
      .theme-dark .bg-brand-green-light > button.bg-white:hover {
          background-color: rgba(255, 255, 255, 0.08) !important;
      }

      .theme-dark input, .theme-dark textarea, .theme-dark select {
          background-color: var(--bg-primary) !important;
          color: var(--text-primary) !important;
          border-color: var(--border-color) !important;
      }
      .theme-dark input::placeholder, .theme-dark textarea::placeholder {
          color: #64748B !important;
      }
      .theme-dark input:focus, .theme-dark textarea:focus, .theme-dark select:focus {
          border-color: var(--accent-green) !important;
          outline: none;
      }

      .theme-dark .bg-white, 
      .theme-dark .bg-white\/80,
      .theme-dark [class*="bg-white/"] {
          background-color: rgba(30, 41, 59, 0.85) !important; /* slate-800 transparent */
          backdrop-filter: blur(25px) saturate(130%) !important;
          -webkit-backdrop-filter: blur(25px) saturate(130%) !important;
          border: 1px solid rgba(255, 255, 255, 0.05) !important;
          box-shadow: 0 8px 32px rgba(10, 12, 18, 0.2), 
                      0 2px 12px rgba(10, 12, 18, 0.1),
                      inset 0 1px 1px rgba(255, 255, 255, 0.06) !important;
          transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                      box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                      border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
      }

      .theme-athlete .bg-white, 
      .theme-athlete .bg-white\/80,
      .theme-athlete [class*="bg-white/"] {
          background-color: rgba(44, 51, 62, 0.85) !important; /* bg-card transparent */
          backdrop-filter: blur(25px) saturate(130%) !important;
          -webkit-backdrop-filter: blur(25px) saturate(130%) !important;
          border: 1px solid rgba(255, 255, 255, 0.05) !important;
          box-shadow: 0 8px 32px rgba(10, 12, 18, 0.4), 
                      0 2px 12px rgba(10, 12, 18, 0.2),
                      inset 0 1px 1px rgba(255, 255, 255, 0.06) !important;
          transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                      box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                      border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
      }

      .theme-dark .grid > .bg-white:hover,
      .theme-dark .grid > .bg-white\/80:hover {
          transform: translateY(-3px) !important;
          border-color: rgba(16, 185, 129, 0.2) !important;
          box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3) !important;
      }

      .theme-dark .ambient-blob {
        display: none !important;
      }
      .theme-dark .ambient-mesh-overlay {
        background-image: radial-gradient(circle at 30% 20%, rgba(16, 185, 129, 0.02) 0%, transparent 60%) !important;
        opacity: 0.15;
      }
      .theme-dark .ambient-grid-pattern {
        background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px) !important;
        opacity: 0.3;
      }

      .theme-dark .chat-bubble.bot {
          background-color: var(--bg-card);
          color: var(--text-primary);
          border: 1px solid var(--border-color);
      }
      .theme-dark .chat-bubble.user {
          background-color: #2563eb; /* blue-600 */
          color: var(--text-primary);
      }

      /* === ATHLETE MODE THEME === */
      .theme-athlete {
        --bg-primary: #0F1115;
        --bg-sidebar: #161A20;
        --bg-card: #2C333E;
        --bg-card-alt: #374151; /* for progress bar tracks and other elements */
        --border-color: #4B5563;
        --text-primary: #EAEAEA;
        --text-secondary: #A0AEC0;
        --accent-red: #EF4444;
        --accent-orange: #F97316;
        --accent-blue: #3B82F6;
        --accent-yellow: #FBBF24;
        --active-sidebar-bg: rgba(239, 68, 68, 0.15); /* Red with opacity */
      }
      .theme-athlete {
        background-color: var(--bg-primary);
        color: var(--text-primary);
      }
      .theme-athlete aside {
        background-color: var(--bg-sidebar) !important;
        border-color: var(--bg-sidebar) !important;
      }
      
      /* --- THEME OVERRIDE FIXES --- */
      .theme-athlete.bg-slate-50, .theme-athlete.bg-slate-100 { background-color: var(--bg-primary); }
      .theme-athlete .bg-white, .theme-athlete .bg-white\/80, .theme-athlete [class*="bg-white/"] { background-color: var(--bg-card) !important; }
      
      .theme-athlete .hover\:bg-gray-100:hover, 
      .theme-athlete .bg-gray-50, 
      .theme-athlete .bg-gray-100, 
      .theme-athlete .bg-gray-200, 
      .theme-athlete .bg-slate-50, 
      .theme-athlete .bg-slate-100, 
      .theme-athlete .bg-slate-200,
      .theme-athlete [class*="bg-slate-50/"],
      .theme-athlete [class*="bg-slate-100/"],
      .theme-athlete [class*="bg-slate-200/"],
      .theme-athlete [class*="bg-gray-50/"],
      .theme-athlete [class*="bg-gray-100/"] { 
          background-color: var(--bg-card-alt) !important; 
      }
      /* --- END THEME OVERRIDE FIXES --- */

      .theme-athlete .text-slate-950, .theme-athlete .text-slate-900, .theme-athlete .text-slate-850, .theme-athlete .text-slate-800 { color: var(--text-primary) !important; }
      .theme-athlete .text-slate-705, .theme-athlete .text-slate-700, .theme-athlete .text-slate-600 { color: #CBD5E0 !important; }
      .theme-athlete .text-slate-500, .theme-athlete .text-slate-400 { color: var(--text-secondary) !important; }

      .theme-athlete .border-gray-100, .theme-athlete .border-gray-200, .theme-athlete .border-gray-300,
      .theme-athlete [class*="border-gray-"], 
      .theme-athlete [class*="border-slate-"] { 
          border-color: var(--border-color) !important; 
      }

      .theme-athlete .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.4); }
      .theme-athlete .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.4); }

      /* Component-specific overrides */
      .theme-athlete .bg-brand-green { background-color: var(--accent-red); }
      .theme-athlete .hover\:bg-brand-green-dark:hover { background-color: #DC2626; } /* red-600 */
      .theme-athlete .bg-brand-green-light { background-color: var(--active-sidebar-bg); }
      .theme-athlete .text-brand-green { color: var(--accent-red); }
      .theme-athlete .text-brand-green-dark { color: var(--accent-red); }
      .theme-athlete .border-brand-green { border-color: var(--accent-red); }
      
      /* Inactive tab button in Dieta view */
      .theme-athlete .bg-brand-green-light > button.bg-white {
          background-color: transparent !important;
          color: var(--text-secondary) !important;
      }
      .theme-athlete .bg-brand-green-light > button.bg-white:hover {
          background-color: rgba(255, 255, 255, 0.08) !important;
      }


      .theme-athlete .bg-brand-blue-light { background-color: rgba(59, 130, 246, 0.2); }
      .theme-athlete .text-brand-blue { color: var(--accent-blue); }
      .theme-athlete .border-brand-blue { border-color: var(--accent-blue); }
      .theme-athlete .bg-brand-blue { background-color: var(--accent-blue); }
      .theme-athlete .bg-brand-blue-dark { background-color: #2563eb; } /* blue-600 */
      .theme-athlete .text-brand-blue-dark { color: #93c5fd; } /* blue-300 */
      .theme-athlete .border-brand-blue-dark { border-color: var(--accent-blue); }
      
      .theme-athlete .bg-blue-100 { background-color: rgba(96, 165, 250, 0.15); } /* blue-400 opacity */
      .theme-athlete .text-blue-700 { color: #60a5fa; } /* blue-400 */
      .theme-athlete .text-blue-800 { color: #93c5fd; } /* blue-300 */
      .theme-athlete .border-blue-200 { border-color: var(--accent-blue); } 
      .theme-athlete .bg-blue-500, .theme-athlete .bg-sky-500 { background-color: var(--accent-blue); }
      .theme-athlete .hover\:bg-blue-600:hover { background-color: #1d4ed8; } /* blue-700 */
      .theme-athlete .bg-blue-600 { background-color: #1d4ed8; } /* blue-700 */

      .theme-athlete .text-brand-orange { color: var(--accent-orange); }
      .theme-athlete .bg-brand-orange, .theme-athlete .bg-amber-500 { background-color: var(--accent-orange); }
      .theme-athlete .bg-brand-orange-light, .theme-athlete .bg-orange-100 { background-color: rgba(249, 115, 22, 0.15); }
      .theme-athlete .text-orange-500 { color: #fb923c; }

      .theme-athlete .bg-purple-600 { background-color: var(--accent-red); }
      .theme-athlete .hover\:bg-purple-700:hover { background-color: #DC2626; }
      .theme-athlete .text-purple-600 { color: var(--accent-red); }
      .theme-athlete .bg-purple-100 { background-color: rgba(239, 68, 68, 0.15); }
      
      .theme-athlete .bg-teal-500 { background-color: var(--accent-red); }
      .theme-athlete .hover\:bg-teal-600:hover { background-color: #C53030; }
      
      .theme-athlete .bg-emerald-500 { background-color: var(--accent-red); }


      /* === CHAT BUBBLE STYLES === */
        .chat-bubble {
            position: relative;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            max-width: 80%;
        }
        .chat-bubble.user {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .chat-bubble.bot {
            background-color: #f1f5f9; /* slate-100 */
            color: #1e293b; /* slate-800 */
            border-bottom-left-radius: 0.25rem;
        }
        .theme-athlete .chat-bubble.bot {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .theme-athlete .chat-bubble.user {
            background-color: #2563eb; /* blue-600 */
            color: var(--text-primary);
        }
        .chat-bubble.thinking .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #94a3b8;
            color: #94a3b8;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        .chat-bubble.thinking .dot-flashing::before, .chat-bubble.thinking .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .chat-bubble.thinking .dot-flashing::before {
            left: -10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #94a3b8;
            color: #94a3b8;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .chat-bubble.thinking .dot-flashing::after {
            left: 10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #94a3b8;
            color: #94a3b8;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }

        @keyframes dot-flashing {
            0% { background-color: #94a3b8; }
            50%, 100% { background-color: rgba(148, 163, 184, 0.2); }
        }
      /* === END CHAT BUBBLE STYLES === */
      
      /* === CHAT SCROLLBAR === */
        .chat-messages-container::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages-container::-webkit-scrollbar-thumb {
            background-color: #d1d5db; /* gray-300 */
            border-radius: 20px;
            border: 3px solid #f8fafc; /* slate-50 */
        }
        .theme-athlete .chat-messages-container::-webkit-scrollbar-thumb {
            background-color: #52525b; /* zinc-600 */
            border-color: var(--bg-primary);
        }
      /* === END CHAT SCROLLBAR === */

      /* === ATHLETE MODE BUTTON === */
      .athlete-mode-inactive-button {
        background: linear-gradient(135deg, #4b5563, #1f2937); /* gray-600 to gray-800 */
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
      }
      .athlete-mode-inactive-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        background: linear-gradient(135deg, #374151, #111827); /* gray-700 to gray-900 */
      }
      .athlete-mode-active-button {
        background: linear-gradient(135deg, #ef4444, #f97316); /* red-500 to orange-500 */
        box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
        transition: all 0.3s ease;
      }
      .athlete-mode-active-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
      }

      /* Shake animation for the inactive button to draw attention */
      @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
      }
      .shake-animation {
        animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both;
      }
      /* === END ATHLETE MODE BUTTON === */

      /* Flame Animation */
      @keyframes rise {
        from {
          transform: translateY(100%) scale(1.5);
          opacity: 0.8;
        }
        to {
          transform: translateY(-20%) scale(1);
          opacity: 0;
        }
      }

      .flame {
        position: absolute;
        bottom: 0;
        width: 250px;
        height: 300px;
        background: radial-gradient(circle, rgba(255,165,0,0.8) 0%, rgba(255,69,0,0.6) 40%, rgba(220,20,60,0.3) 70%, rgba(0,0,0,0) 100%);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        transform: rotate(-45deg);
        animation: rise 2s ease-out forwards;
        filter: blur(10px);
      }

      .flame:nth-child(2) {
        width: 200px;
        height: 250px;
        animation-delay: 0.2s;
        animation-duration: 1.8s;
      }
      .flame:nth-child(3) {
        width: 300px;
        height: 350px;
        animation-delay: 0.4s;
        animation-duration: 2.2s;
      }

      /* === DASHBOARD FAB === */
      .dashboard-fab {
        position: fixed;
        bottom: 4rem; /* 64px */
        left: 50%;
        transform: translateX(-50%);
        height: 3.5rem; /* 56px */
        padding: 0 1.5rem; /* 24px */
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background-color: #ffffff;
        border: 4px solid #f1f5f9; /* slate-100 */
      }
      .dashboard-fab:hover {
        transform: translateX(-50%) translateY(-4px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      }
      .dashboard-fab .icon {
          transition: color 0.3s ease;
          color: #00B894; /* brand-green */
      }
       .dashboard-fab .dashboard-fab-text {
          transition: color 0.3s ease;
          color: #00B894; /* brand-green */
      }
      .dashboard-fab.active {
        background-color: var(--brand-green, #00B894);
        border-color: #E6F8F0;
      }
      .dashboard-fab.active .icon, .dashboard-fab.active .dashboard-fab-text {
        color: white;
      }
      .theme-athlete .dashboard-fab {
        background-color: #27272a; /* zinc-800 */
        border-color: #18181b; /* zinc-900 */
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      }
      .theme-athlete .dashboard-fab:hover {
        background-color: #3f3f46; /* zinc-700 */
      }
       .theme-athlete .dashboard-fab .icon, .theme-athlete .dashboard-fab .dashboard-fab-text {
        color: #d4d4d8; /* zinc-300 */
       }
      .theme-athlete .dashboard-fab.active {
        background: var(--accent-red);
        border-color: var(--bg-card);
      }
      .theme-athlete .dashboard-fab.active .icon, .theme-athlete .dashboard-fab.active .dashboard-fab-text {
        color: white;
      }
      /* === END DASHBOARD FAB === */

      /* === MARKDOWN STYLES === */
      .markdown-content {
        color: #334155; /* slate-700 */
      }
      .theme-athlete .markdown-content { color: var(--text-secondary); }

      .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        font-weight: 600;
        margin-top: 1em;
        margin-bottom: 0.5em;
        color: #1e293b; /* slate-800 */
      }
      .theme-athlete .markdown-content h1, .theme-athlete .markdown-content h2, .theme-athlete .markdown-content h3 { color: var(--text-primary); }
      
      .markdown-content h1 { font-size: 1.25em; }
      .markdown-content h2 { font-size: 1.15em; }
      .markdown-content h3 { font-size: 1.1em; }
      
      .markdown-content p {
        margin-bottom: 0.75em;
        line-height: 1.6;
      }
      
      .markdown-content ul, .markdown-content ol {
        margin-left: 1.5rem;
        margin-bottom: 1em;
        list-style-position: outside;
      }
      .markdown-content ul { list-style-type: disc; }
      .markdown-content ol { list-style-type: decimal; }
      .markdown-content li { margin-bottom: 0.25em; }
      
      .markdown-content strong {
        font-weight: 600;
        color: #1e293b; /* slate-800 */
      }
      .theme-athlete .markdown-content strong { color: var(--text-primary); }
      
      .markdown-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5em 0;
        font-size: 0.9em;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        overflow: hidden;
        background-color: #fff;
      }
      .theme-athlete .markdown-content table {
        background-color: var(--bg-card);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      
      .markdown-content th, .markdown-content td {
        padding: 14px 18px;
        text-align: left;
      }
      
      .markdown-content thead tr {
        background-color: #f8fafc; /* slate-50 */
      }
      .theme-athlete .markdown-content thead tr {
        background-color: #3f3f46;
      }
      
      .markdown-content th {
        font-weight: 600;
        color: #475569; /* slate-600 */

        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 2px solid #e2e8f0; /* slate-200 */

      .theme-athlete .markdown-content th {
        color: var(--text-secondary);
        border-bottom-color: var(--border-color);
      }
      
      .markdown-content tbody tr {
        border-bottom: 1px solid #f1f5f9; /* slate-100 */
      }

      }
      
      .markdown-content tbody tr:last-of-type {
        border-bottom: none;
      }
      .markdown-content tbody tr:hover {
        background-color: #f8fafc; /* slate-50 */
      }
      .theme-athlete .markdown-content tbody tr:hover {
         background-color: #3f3f46;
      }
      
      .markdown-content td {
        color: #334155; /* slate-700 */
      }
      .theme-athlete .markdown-content td {
        color: var(--text-primary);
      }
      
      /* === RESPONSIVE TABLE STYLES === */
      @media screen and (max-width: 640px) {
        .markdown-content table {
          border: 0;
          box-shadow: none;
        }

        .markdown-content table thead {
          border: none;
          clip: rect(0 0 0 0);
          height: 1px;
          margin: -1px;
          overflow: hidden;
          padding: 0;
          position: absolute;
          width: 1px;
        }

        .markdown-content table tr {
          display: block;
          margin-bottom: 1.25rem;
          border: 1px solid #e2e8f0; /* slate-200 */
          border-radius: 12px;
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
          background-color: #ffffff;
        }
        .theme-athlete .markdown-content table tr {
           border-color: var(--border-color);
           background-color: var(--bg-card);
        }

        .markdown-content table td {
          display: block;
          text-align: right;
          padding: 12px 16px;
          border-bottom: 1px solid #f1f5f9; /* slate-100 */
        }
        .theme-athlete .markdown-content table td {
          border-bottom-color: var(--border-color);
        }

        .markdown-content table td:last-child {
          border-bottom: 0;
        }

        .markdown-content table td::before {
          content: attr(data-label);
          float: left;
          font-weight: 600;
          color: #475569; /* slate-600 */
          text-transform: uppercase;
          font-size: 0.75rem;
          margin-right: 1rem;

        .theme-athlete .markdown-content table td::before {
            color: var(--text-secondary);

      .profile-featured-achievement {

      /* === TUTORIAL STYLES === */
      .tutorial-highlight-box {
          position: fixed;
          border-radius: 8px;
          box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75), 0 0 15px rgba(255, 255, 255, 0.3);
          transition-property: top, left, width, height;
          transition-duration: 0.4s;
          transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
          pointer-events: none;
          z-index: 1001;
      }

      .tutorial-dialog {
          position: fixed;
          z-index: 1002;
          background-color: white;
          padding: 1.5rem;
          border-radius: 12px;
          width: 380px;
          max-width: 90vw;
          box-shadow: 0 5px 25px rgba(0,0,0,0.2);

          transition-duration: 0.4s;
          transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);

          transform: translateY(0) scale(1);

      .tags-container {
          max-height: 500px; /* Large enough to hold all tags */
          overflow: hidden;
          transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out, margin-top 0.4s ease-in-out;

      }

      .tags-container.collapsed {
          max-height: 0;
          opacity: 0;
      }

      .collapsible-content {
          max-height: 0;
          overflow: hidden;
          transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
          opacity: 0;

          max-height: 1000px; /* Large enough for content */

      /* === AMBIENT FLOATING GRADIENTS / AURORA GLOW === */
      @keyframes float-blob-1 {
        0%, 100% { transform: translate3d(0px, 0px, 0); }
        50% { transform: translate3d(20px, -15px, 0); }
      }

      @keyframes float-blob-2 {
        0%, 100% { transform: translate3d(0px, 0px, 0); }
        50% { transform: translate3d(-15px, 20px, 0); }
      }

      @keyframes float-blob-3 {
        0%, 100% { transform: translate3d(0px, 0px, 0); }
        50% { transform: translate3d(15px, 15px, 0); }
      }

      @keyframes float-blob-4 {
        0%, 100% { transform: translate3d(0px, 0px, 0); }
        50% { transform: translate3d(-15px, -15px, 0); }
      }

      @keyframes mesh-pulse {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 20px 20px; }
      }

      @keyframes pattern-drift {
        0%, 100% { background-position: 0px 0px; }
      }

      /* Base mesh gradient layer */
      .ambient-mesh-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        opacity: 0.15;
        transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        background-size: 200% 200%;
      }

      .theme-light .ambient-mesh-overlay {
        background-image: radial-gradient(circle at 15% 15%, rgba(16, 185, 129, 0.15) 0%, transparent 55%),
                          radial-gradient(circle at 85% 85%, rgba(52, 211, 153, 0.15) 0%, transparent 55%);
      }

      .theme-athlete .ambient-mesh-overlay {
        background-image: radial-gradient(circle at 30% 20%, rgba(239, 68, 68, 0.08) 0%, transparent 60%),
                          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 60%);
        opacity: 0.3;
      }

      /* Tiny clean dots matrix pattern overlay background */
      .ambient-grid-pattern {
        position: absolute;
        inset: 0;
        z-index: 3;
        opacity: 0.25;
        transition: all 1s ease;
        background-size: 24px 24px;
        mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0) 100%);
        -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0) 100%);
      }

      .theme-light .ambient-grid-pattern {
        background-image: radial-gradient(rgba(16, 185, 129, 0.1) 1.2px, transparent 1.2px);
      }

      .theme-athlete .ambient-grid-pattern {
        background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        opacity: 0.45;
      }

      .ambient-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(160px);
        transform: translate3d(0, 0, 0);
        z-index: 2;
        pointer-events: none;

      /* === PROGRESSIVE GREEN GRADIENT THEME (MODO CLARO VERDINHO) === */
      .theme-light {
        background: linear-gradient(135deg, #f2fdf5 0%, #e6f8f0 45%, #dcfce7 100%) !important;
        color: #0f172a;
      }
      
      .theme-light.bg-slate-50, 
      .theme-light.bg-slate-100 { 
          background: linear-gradient(135deg, #f2fdf5 0%, #e6f8f0 45%, #dcfce7 100%) !important; 
      }
      
      .theme-light .hover\:bg-gray-100:hover, 
      .theme-light .bg-gray-50, 
      .theme-light .bg-gray-105,
      .theme-light .bg-gray-100, 
      .theme-light .bg-gray-200, 
      .theme-light .bg-slate-50, 
      .theme-light .bg-slate-100, 
      .theme-light .bg-slate-200,
      .theme-light [class*="bg-slate-50/"],
      .theme-light [class*="bg-slate-100/"],
      .theme-light [class*="bg-slate-200/"],
